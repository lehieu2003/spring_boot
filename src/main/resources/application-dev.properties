spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/learn?sslmode=disable}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Keep local development flexible
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# Development-only fallback secret (>= 256-bit key when base64-decoded).
app.jwt.secret=${APP_JWT_SECRET:MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=}
